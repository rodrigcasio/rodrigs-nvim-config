# --- Prefix and Reload ---
unbind r
bind r source-file ~/.tmux.conf
set -g prefix C-s

# --- Terminal Capabilities (Crucial for True Color / Alacritty) ---
set -g default-terminal "tmux-256color"
set -ga terminal-features ",*:RGB"

# --- Basic Options and Usability ---
set -g mouse on
set -g assume-paste-time 0
set -g status-justify left
set -g allow-rename off
set -g automatic-rename off

# Use vi keys in copy mode and for pane navigation
setw -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Move status bar to the top
set-option -g status-position top

# --- Enable blinking cursor in Alacritty with Tmux ---
set -ga terminal-overrides ',alacritty:cnorm=\E[?12h\E[?25h'

# --- Minimal Theme Look ---
set -g status-style "bg=default,fg=white"
set -g status-left "[#S] "
set -g status-right "%H:%M │ %d-%b-%y"
