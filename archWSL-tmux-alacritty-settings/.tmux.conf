# ======================================================================
# MINIMALIST TMUX CONFIGURATION (Zero-Plugin / Performance Focus)
# ======================================================================

# --- Prefix and Reload ---
unbind r
bind r source-file ~/.tmux.conf

# Keep your custom prefix C-s
set -g prefix C-s

# --- Terminal Capabilities (Crucial for True Color / Alacritty) ---
set -g default-terminal "tmux-256color"
set -ga terminal-features ",*:RGB"

# --- Basic Options and Usability ---
set -g mouse on
set -g assume-paste-time 0
set -g status-justify left
set-option -g status-position top

# --- Minimalist Built-in Status Bar Styles (No Plugins Required) ---
set -g status-bg "#1d1f21"  # Matches your Alacritty background perfectly
set -g status-fg "#d8d8d8"  # Matches your Alacritty foreground text
set -g status-left "[#S] "  # Shows just the current session name
set -g status-right " %H:%M " # Shows just a plain, fast system clock

# Restore simple window naming controls 
set -g allow-rename off
set -g automatic-rename off

# --- Vim Keybindings for Split/Tile Navigation ---
setw -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# --- Terminal Overrides for Perfect Alacritty Alignment ---
set -as terminal-features ",alacritty:RGB"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-overrides ",alacritty:Sync"
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[2 q'
