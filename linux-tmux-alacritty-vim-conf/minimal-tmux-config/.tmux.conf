# ======================================================================
# MINIMAL TMUX CONFIGURATION (No Plugins, No TPM)
# ======================================================================

# --- Prefix and Reload ---
unbind r
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Keep your custom prefix C-s
set -g prefix C-s

# --- Terminal Capabilities (Crucial for True Color / Alacritty) ---
set -g default-terminal "tmux-256color"
set -ga terminal-features ",*:RGB"

# Enable blinking cursor in Alacritty when using Tmux
set -ga terminal-overrides ',alacritty:cnorm=\E[?12h\E[?25h'

# --- Basic Options and Usability ---
set -g mouse on
set -g assume-paste-time 0
set -g base-index 1           # Start window numbers at 1 (easier to reach than 0)
setw -g pane-base-index 1     # Start pane numbers at 1

# Restore simple window naming controls 
set -g allow-rename off
set -g automatic-rename off

# --- Vi Keys Navigation ---
setw -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# --- Minimal & Clean Status Bar Design ---
set-option -g status-position top
set -g status-justify left
set -g status-interval 5

# Status Bar Colors (Clean dark theme utilizing terminal colors)
set -g status-style "bg=default,fg=white" # Transparent/Default background

# Left Side: Current Session Name
set -g status-left-length 50
set -g status-left "#[fg=green,bold] 󰘔 #S #[fg=white,nobold]│ "

# Right Side: Time and Date (Super lightweight, no background CPU plugins)
set -g status-right-length 50
set -g status-right "#[fg=blue] %Y-%m-%d │ #[fg=white,bold]%H:%M "

# Window Tabs Styling (Simple, crisp indicators)
setw -g window-status-format "#[fg=gray] #I:#W "
setw -g window-status-current-format "#[fg=cyan,bold] [#I:#W] "

# Pane border styling (Clean distraction-free lines)
set -g pane-border-style "fg=gray"
set -g pane-active-border-style "fg=cyan"
